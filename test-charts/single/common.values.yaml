global:
  region: us-west-1
  ignoreLookup: "true"

activeRegion: us-west-1

port: 5000
portName: api

resources:
  cpu: 250m
  memory: 500Mi

replicas: 3

image:
  url: myrepo/myapp
  pullSecrets:
    - registry-secret

volumes:
  secrets:
    app-secret:
      mountPath: /run/secrets
  empty:
    writable-tmp:
      mountPath: /tmp/scratch

envFrom:
  secrets:
    app-secret: {}
  configMaps:
    app-config: {}

env:
  secrets:
    feature-config:
      - key: API_TOKEN
        variable: APP_API_TOKEN
      - key: API_TOKEN
        variable: APP_API_TOKEN_COPY
  configMaps:
    feature-config:
      - key: DB_HOSTS
        variable: DATABASE_HOSTS

configMap:
  data:
    KEY1: "VALUE"
    KEY2: "4565"
    KEY3: "0/10 * * * *"
    PORT: "{{ .Values.port }}"

regions:
  us-east-1:
    configMap:
      data:
        ENDPOINT: "storage.us-east-1.example.com"
        URL: "sso.us-east-1.example.com"
  us-west-1:
    configMap:
      data:
        ENDPOINT: "storage.us-west-1.example.com"
        URL: "sso.us-west-1.example.com"

probes:
  readiness:
    httpGet:
      path: /health
      port: 5000
      scheme: HTTP
  liveness:
    exec:
      command:
        - echo
        - alive
    failureThreshold: 1
    initialDelaySeconds: 15
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 30
  startup:
    httpGet:
      path: /ready
      port: 5000
    failureThreshold: 30
    periodSeconds: 10

initContainers:
  - name: db-migration
    image:
      url: myrepo/migrator
      tag: "1.0"
    command: ["/bin/sh"]
    args: ["-c", "echo running migration && sleep 2"]
    resources:
      cpu: 100m
      memory: 128Mi

sidecars:
  - name: log-shipper
    image:
      url: fluent/fluent-bit
      tag: "2.2"
    port: 2020
    portName: metrics
    resources:
      cpu: 50m
      memory: 64Mi
