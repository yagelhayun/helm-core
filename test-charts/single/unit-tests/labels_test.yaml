suite: core.common.labels and core.deployment.labels
templates:
  - templates/deployment.yaml
tests:
  - it: renders app.kubernetes.io/name label
    values:
      - ../minimal.values.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: core-test-single

  - it: renders app.kubernetes.io/managed-by label
    values:
      - ../minimal.values.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: renders commit label on deployment when global.commit is set
    values:
      - ../minimal.values.yaml
    set:
      global.commit: "abc1234"
    asserts:
      - equal:
          path: metadata.labels.commit
          value: "abc1234"

  - it: renders numeric commit as a quoted string
    values:
      - ../minimal.values.yaml
    set:
      global.commit: 42
    asserts:
      - equal:
          path: metadata.labels.commit
          value: "42"

  - it: omits commit label when global.commit is not set
    values:
      - ../minimal.values.yaml
    asserts:
      - notExists:
          path: metadata.labels.commit
