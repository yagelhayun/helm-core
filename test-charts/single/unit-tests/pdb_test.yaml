suite: core.pdb — PodDisruptionBudget rendering
templates:
  - templates/pdb.yaml
tests:
  - it: renders PodDisruptionBudget when enabled is true
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: true
      pdb.maxUnavailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget

  - it: uses maxUnavailable when configured
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: true
      pdb.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - notExists:
          path: spec.minAvailable

  - it: uses maxUnavailable as percentage string
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: true
      pdb.maxUnavailable: "25%"
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: "25%"

  - it: uses minAvailable when configured
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: true
      pdb.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
      - notExists:
          path: spec.maxUnavailable

  - it: prefers minAvailable over maxUnavailable when both are set
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: true
      pdb.minAvailable: 1
      pdb.maxUnavailable: 1
    asserts:
      - exists:
          path: spec.minAvailable
      - notExists:
          path: spec.maxUnavailable

  - it: selector uses selectorLabels (app.kubernetes.io/name only)
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: true
      pdb.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: core-test-single
      - notExists:
          path: spec.selector.matchLabels["helm.sh/chart"]

  - it: does not render PodDisruptionBudget when enabled is false
    values:
      - ../minimal.values.yaml
    set:
      pdb.enabled: false
    asserts:
      - hasDocuments:
          count: 0
