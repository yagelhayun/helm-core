suite: core.pod — imagePullSecrets, initContainers, sidecars, annotations, topology, revisionHistoryLimit
templates:
  - templates/deployment.yaml
tests:
  - it: renders imagePullSecrets from image.pullSecrets
    values:
      - ../common.values.yaml
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: registry-secret

  - it: omits imagePullSecrets when not configured
    values:
      - ../minimal.values.yaml
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: renders initContainer with correct name
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: db-migration

  - it: renders initContainer with correct image
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: myrepo/migrator:1.0

  - it: omits initContainers when not configured
    values:
      - ../minimal.values.yaml
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: renders sidecar container with correct name
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: log-shipper

  - it: renders sidecar container with correct image
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[1].image
          value: fluent/fluent-bit:2.2

  - it: renders checksum annotation on pod template when configMap.data is set
    values:
      - ../common.values.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: omits pod annotations when configMap.data is not set
    values:
      - ../minimal.values.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: defaults revisionHistoryLimit to 1 when not configured
    values:
      - ../minimal.values.yaml
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 1

  - it: uses configured revisionHistoryLimit
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    # prod.values.yaml: revisionHistoryLimit: 3
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: renders default topology spread constraints when not configured
    values:
      - ../minimal.values.yaml
    asserts:
      - contains:
          path: spec.template.spec.topologySpreadConstraints
          content:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: core-test-single
      - contains:
          path: spec.template.spec.topologySpreadConstraints
          content:
            maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: core-test-single

  - it: omits topologySpreadConstraints when set to empty list
    values:
      - ../minimal.values.yaml
    set:
      topologySpreadConstraints: []
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints
