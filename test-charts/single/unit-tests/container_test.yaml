suite: core.container.render
templates:
  - templates/deployment.yaml
tests:
  - it: renders image as url:tag
    values:
      - common.values.yaml
      - prod.values.yaml
    # image.url=myrepo/myapp, prod image.tag=v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: myrepo/myapp:v1.2.3

  - it: defaults image tag to latest when not specified
    values:
      - common.values.yaml
    # common.values.yaml has no image.tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: myrepo/myapp:latest

  - it: renders containerPort from port value
    values:
      - common.values.yaml
    # port=5000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5000

  - it: uses portName value for port name
    values:
      - common.values.yaml
    # portName=api
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: api

  - it: defaults port name to http when portName is not set
    set:
      global.region: us-west-1
      global.ignoreLookup: "true"
      port: 8080
      replicas: 1
      resources.cpu: 250m
      resources.memory: 512Mi
      image.url: myapp
      # no portName
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
