suite: core.pod.volumes and core.container.volumeMounts
templates:
  - templates/deployment.yaml
tests:
  - it: renders a secret volume
    values:
      - ../common.values.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: app-secret
            secret:
              secretName: app-secret
              defaultMode: 420

  - it: renders an emptyDir volume
    values:
      - ../common.values.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: writable-tmp
            emptyDir: {}

  - it: renders a volumeMount for a secret volume
    values:
      - ../common.values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: app-secret
            mountPath: /run/secrets

  - it: renders a volumeMount for an emptyDir volume
    values:
      - ../common.values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: writable-tmp
            mountPath: /tmp/scratch

  - it: renders no volumes when volumes is not set
    values:
      - ../minimal.values.yaml
    asserts:
      - notExists:
          path: spec.template.spec.volumes
