suite: core.container.probes
templates:
  - templates/deployment.yaml
tests:
  - it: renders httpGet readiness probe with configured path
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: renders httpGet readiness probe with configured scheme
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTP

  - it: renders exec liveness probe command
    values:
      - ../common.values.yaml
    # probes.liveness.exec.command: [echo, alive]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.exec
          value:
            - echo
            - alive

  - it: uses explicitly configured liveness probe thresholds
    values:
      - ../common.values.yaml
    # failureThreshold: 1, initialDelaySeconds: 15, periodSeconds: 15
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 1
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 15
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 15

  - it: applies default failureThreshold of 3 when not configured
    values:
      - ../minimal.values.yaml
    set:
      probes.readiness.httpGet.path: /health
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 3

  - it: applies default periodSeconds of 30 when not configured
    values:
      - ../minimal.values.yaml
    set:
      probes.readiness.httpGet.path: /health
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 30

  - it: applies default initialDelaySeconds of 40 when not configured
    values:
      - ../minimal.values.yaml
    set:
      probes.readiness.httpGet.path: /health
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 40

  - it: renders startup probe
    values:
      - ../common.values.yaml
    asserts:
      - exists:
          path: spec.template.spec.containers[0].startupProbe

  - it: omits probes when not configured
    values:
      - ../minimal.values.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].startupProbe
