suite: core.serviceaccount — ServiceAccount creation and pod reference
tests:
  - it: renders ServiceAccount when serviceAccount.create is true
    templates:
      - templates/serviceaccount.yaml
    values:
      - ../minimal.values.yaml
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: uses chart name as ServiceAccount name when no name is set
    templates:
      - templates/serviceaccount.yaml
    values:
      - ../minimal.values.yaml
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.name
          value: core-test-single

  - it: uses configured name when serviceAccount.name is set
    templates:
      - templates/serviceaccount.yaml
    values:
      - ../minimal.values.yaml
    set:
      serviceAccount.create: true
      serviceAccount.name: my-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: does not render ServiceAccount when serviceAccount.create is false
    templates:
      - templates/serviceaccount.yaml
    values:
      - ../minimal.values.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render ServiceAccount when serviceAccount is not set
    templates:
      - templates/serviceaccount.yaml
    values:
      - ../minimal.values.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: pod spec references chart name when create is true and no name is set
    templates:
      - templates/deployment.yaml
    values:
      - ../minimal.values.yaml
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: core-test-single

  - it: pod spec references configured name when create is true and name is set
    templates:
      - templates/deployment.yaml
    values:
      - ../minimal.values.yaml
    set:
      serviceAccount.create: true
      serviceAccount.name: my-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-sa

  - it: pod spec falls back to default when create is false and no name is set
    templates:
      - templates/deployment.yaml
    values:
      - ../minimal.values.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
