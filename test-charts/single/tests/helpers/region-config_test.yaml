suite: core.general.config — region merging and tpl resolution
templates:
  - templates/configmap.yaml
tests:
  - it: applies region-specific data when region matches
    values:
      - ../_shared/common.yaml
    # global.region=us-west-1 → ENDPOINT from regions.us-west-1
    asserts:
      - equal:
          path: data.ENDPOINT
          value: storage.us-west-1.example.com

  - it: applies the correct override when region changes
    values:
      - ../_shared/common.yaml
    set:
      global.region: us-east-1
    asserts:
      - equal:
          path: data.ENDPOINT
          value: storage.us-east-1.example.com

  - it: preserves root-level keys that have no region override
    values:
      - ../_shared/common.yaml
    asserts:
      - equal:
          path: data.KEY1
          value: VALUE

  - it: merges region override into root-level keys rather than replacing them
    values:
      - ../_shared/common.yaml
    # KEY1 is root-only; ENDPOINT is region-only — both must appear
    asserts:
      - equal:
          path: data.KEY1
          value: VALUE
      - equal:
          path: data.ENDPOINT
          value: storage.us-west-1.example.com

  - it: resolves tpl expressions inside configMap data values
    values:
      - ../_shared/common.yaml
    # PORT: "{{ .Values.port }}" should resolve to "5000"
    asserts:
      - equal:
          path: data.PORT
          value: "5000"
