suite: core.pod.volumes and core.container.volumeMounts
templates:
  - templates/deployment.yaml
tests:

  # ── Secret volume ─────────────────────────────────────────────────────────────

  - it: renders secret volume with correct defaultMode
    values:
      - ../_shared/common.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: app-secret
            secret:
              secretName: app-secret
              defaultMode: 420

  - it: renders volumeMount for secret volume
    values:
      - ../_shared/common.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: app-secret
            mountPath: /run/secrets

  # ── emptyDir volume ───────────────────────────────────────────────────────────

  - it: renders emptyDir volume
    values:
      - ../_shared/common.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: writable-tmp
            emptyDir: {}

  - it: renders volumeMount for emptyDir volume
    values:
      - ../_shared/common.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: writable-tmp
            mountPath: /tmp/scratch

  # ── PersistentVolumeClaim volume ──────────────────────────────────────────────

  - it: renders persistentVolumeClaim volume
    values:
      - ../_shared/minimal.yaml
    set:
      global.ignoreLookup: "true"
      volumes.persistentVolumeClaims.my-data.mountPath: /data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: my-data
            persistentVolumeClaim:
              claimName: my-data

  - it: renders readOnly persistentVolumeClaim volume
    values:
      - ../_shared/minimal.yaml
    set:
      global.ignoreLookup: "true"
      volumes.persistentVolumeClaims.my-data.mountPath: /data
      volumes.persistentVolumeClaims.my-data.readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: my-data
            persistentVolumeClaim:
              claimName: my-data
              readOnly: true

  - it: renders volumeMount for persistentVolumeClaim
    values:
      - ../_shared/minimal.yaml
    set:
      global.ignoreLookup: "true"
      volumes.persistentVolumeClaims.my-data.mountPath: /data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: my-data
            mountPath: /data

  # ── Absent ────────────────────────────────────────────────────────────────────

  - it: renders no volumes when volumes is not set
    values:
      - ../_shared/minimal.yaml
    asserts:
      - notExists:
          path: spec.template.spec.volumes
