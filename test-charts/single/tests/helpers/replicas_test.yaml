suite: core.workload.replicas — activeRegion logic
templates:
  - templates/deployment.yaml
tests:
  - it: uses configured replicas when activeRegion matches current region
    values:
      - ../_shared/common.yaml
    # common.yaml: activeRegion=us-west-1, global.region=us-west-1, replicas=3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: uses 0 replicas when activeRegion does not match current region
    values:
      - ../_shared/common.yaml
    set:
      global.region: us-east-1
      # activeRegion remains us-west-1 → mismatch → 0
    asserts:
      - equal:
          path: spec.replicas
          value: 0

  - it: uses configured replicas when activeRegion is not set
    values:
      - ../_shared/minimal.yaml
    set:
      replicas: 5
      # no activeRegion → condition is false → use replicas directly
    asserts:
      - equal:
          path: spec.replicas
          value: 5
