# Bare-minimum values — used by tests that check default behaviour when
# optional keys are absent (strategy, topology, revisionHistoryLimit, etc.)
global:
  region: us-east-1
  ignoreLookup: "true"

workload:
  enabled: true
  type: Deployment

ports:
  http:
    port: 8080
replicas: 1
resources:
  cpu: 100m
  memory: 256Mi
image:
  repository: myapp
