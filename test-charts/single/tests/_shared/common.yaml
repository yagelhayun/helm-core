global:
  region: us-west-1
  ignoreLookup: "true"

workload:
  enabled: true
  type: Deployment

activeRegion: us-west-1

ports:
  api:
    port: 5000

resources:
  cpu: 250m
  memory: 500Mi

replicas: 3

image:
  repository: myrepo/myapp
  pullSecrets:
    - registry-secret

volumes:
  secrets:
    app-secret:
      mountPath: /run/secrets
  emptyDirs:
    writable-tmp:
      mountPath: /tmp/scratch

envFrom:
  secrets:
    app-secret: {}
  configMaps:
    app-config: {}

env:
  secrets:
    feature-config:
      - key: API_TOKEN
        variable: APP_API_TOKEN
      - key: API_TOKEN
        variable: APP_API_TOKEN_COPY
  configMaps:
    feature-config:
      - key: DB_HOSTS
        variable: DATABASE_HOSTS

configMap:
  enabled: true
  data:
    KEY1: "VALUE"
    KEY2: "4565"
    KEY3: "0/10 * * * *"
    PORT: '{{ (index .Values.ports "api").port }}'

regions:
  us-east-1:
    configMap:
      data:
        ENDPOINT: "storage.us-east-1.example.com"
        URL: "sso.us-east-1.example.com"
  us-west-1:
    configMap:
      data:
        ENDPOINT: "storage.us-west-1.example.com"
        URL: "sso.us-west-1.example.com"

probes:
  readiness:
    httpGet:
      path: /health
      scheme: HTTP
  liveness:
    exec:
      command:
        - echo
        - alive
    failureThreshold: 1
    initialDelaySeconds: 15
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 30
  startup:
    httpGet:
      path: /ready
    failureThreshold: 30
    periodSeconds: 10

initContainers:
  - name: db-migration
    image:
      repository: myrepo/migrator
      tag: "1.0"
    command: ["/bin/sh"]
    args: ["-c", "echo running migration && sleep 2"]
    resources:
      cpu: 100m
      memory: 128Mi

sidecars:
  - name: log-shipper
    image:
      repository: fluent/fluent-bit
      tag: "2.2"
    ports:
      metrics:
        port: 2020
    resources:
      cpu: 50m
      memory: 64Mi
