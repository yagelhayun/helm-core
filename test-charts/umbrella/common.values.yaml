global:
  region: us-west-1
  port: 8080
  ignoreLookup: "true"

  image:
    pullSecrets:
      - registry-secret

  envFrom:
    secrets:
      app-secret: {}
    configMaps:
      shared-config: {}

  volumes:
    secrets:
      app-secret:
        mountPath: /run/secrets
        files:
          - credentials.json
    empty:
      writable-tmp:
        mountPath: /tmp/scratch

  env:
    secrets:
      feature-config:
        - key: API_TOKEN
          variable: APP_API_TOKEN

common:
  configMap:
    data:
      FEATURE_FLAG: "true"
      CACHE_DIR: '{{ index .Values.global.volumes.secrets "app-secret" "mountPath" }}'
      PORT: "{{ .Values.global.port }}"

worker:
  port: 9999
  portName: grpc

  configMap:
    data:
      mode: worker

  image:
    url: worker

  initContainers:
    - name: wait-for-dependency
      image:
        url: busybox
        tag: "1.36"
      command: ["/bin/sh"]
      args: ["-c", "echo waiting for dependency"]
      resources:
        cpu: 50m
        memory: 64Mi

master:
  port: 1111
  portName: api

  configMap:
    data:
      mode: master

  image:
    url: master
