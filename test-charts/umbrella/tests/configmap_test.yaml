suite: umbrella — configMap data, region merging, and per-component labels
tests:

  # ── common configMap ──────────────────────────────────────────────────────────

  - it: common configmap renders static data
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
    asserts:
      - equal:
          path: data.FEATURE_FLAG
          value: "true"

  - it: common configmap resolves tpl expression referencing global volumes
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
    # CACHE_DIR: '{{ index .Values.global.volumes.secrets "app-secret" "mountPath" }}' → /run/secrets
    asserts:
      - equal:
          path: data.CACHE_DIR
          value: /run/secrets

  - it: common configmap applies region override for us-west-1
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    # global.region=us-west-1
    asserts:
      - equal:
          path: data.BROKER_ADDRESS
          value: broker.us-west-1.example.com:9092

  - it: common configmap applies region override for us-east-1 when region changes
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    set:
      global.region: us-east-1
    asserts:
      - equal:
          path: data.DB_URL
          value: postgresql://db.us-east-1.example.com:5432/myapp

  - it: common configmap merges prod static data
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    asserts:
      - equal:
          path: data.DB_SSL_ENABLED
          value: "true"

  # ── per-component configMaps ──────────────────────────────────────────────────

  - it: master configmap renders per-component data
    templates:
      - charts/master/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    asserts:
      - equal:
          path: data.mode
          value: master

  - it: worker configmap renders per-component data
    templates:
      - charts/worker/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    asserts:
      - equal:
          path: data.mode
          value: worker

  - it: master configmap carries master chart name in labels
    templates:
      - charts/master/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: master

  - it: worker configmap carries worker chart name in labels
    templates:
      - charts/worker/templates/configmap.yaml
    values:
      - ./_shared/common.yaml
      - ./_shared/prod.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: worker
