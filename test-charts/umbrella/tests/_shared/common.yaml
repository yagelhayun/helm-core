global:
  region: us-west-1
  ignoreLookup: "true"

  image:
    pullSecrets:
      - registry-secret

  envFrom:
    secrets:
      app-secret: {}
    configMaps:
      shared-config: {}

  volumes:
    secrets:
      app-secret:
        mountPath: /run/secrets
        files:
          - credentials.json
    emptyDirs:
      writable-tmp:
        mountPath: /tmp/scratch

  env:
    secrets:
      feature-config:
        - key: API_TOKEN
          variable: APP_API_TOKEN

common:
  nameOverride: common
  configMap:
    enabled: true
    data:
      FEATURE_FLAG: "true"
      CACHE_DIR: '{{ index .Values.global.volumes.secrets "app-secret" "mountPath" }}'

worker:
  nameOverride: worker
  ports:
    grpc:
      port: 9999

  configMap:
    enabled: true
    data:
      mode: worker

  image:
    repository: worker

  initContainers:
    - name: wait-for-dependency
      image:
        repository: busybox
        tag: "1.36"
      command: ["/bin/sh"]
      args: ["-c", "echo waiting for dependency"]
      resources:
        cpu: 50m
        memory: 64Mi

master:
  nameOverride: master
  ports:
    api:
      port: 1111

  configMap:
    enabled: true
    data:
      mode: master

  image:
    repository: master
