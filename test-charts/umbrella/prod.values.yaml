global:
  volumes:
    secrets:
      app-secret:
        mountPath: /run/secrets
        files:
          - credentials.json

common:
  configMap:
    data:
      DB_SSL_ENABLED: "true"

  regions:
    us-east-1:
      configMap:
        data:
          BROKER_ADDRESS: "broker.us-east-1.example.com:9092"
          DB_URL: "postgresql://db.us-east-1.example.com:5432/myapp"
    us-west-1:
      configMap:
        data:
          BROKER_ADDRESS: "broker.us-west-1.example.com:9092"
          DB_URL: "postgresql://db.us-west-1.example.com:5432/myapp"

worker:
  replicas: 5

  resources:
    cpu: 1
    memory: 4Gi
    limitMultiplier: 2

  image:
    tag: stable

master:
  replicas: 2

  resources:
    cpu: 3
    memory: 8Gi

  image:
    tag: stable
