suite: umbrella — configmap data and region merging
tests:
  - it: common configmap renders static FEATURE_FLAG
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ../common.values.yaml
    asserts:
      - equal:
          path: data.FEATURE_FLAG
          value: "true"

  - it: common configmap resolves tpl expression for PORT from global.port
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ../common.values.yaml
    # common.configMap.data.PORT: "{{ .Values.global.port }}" → "8080"
    asserts:
      - equal:
          path: data.PORT
          value: "8080"

  - it: common configmap resolves tpl expression for CACHE_DIR from global volumes
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ../common.values.yaml
    # CACHE_DIR: '{{ index .Values.global.volumes.secrets "app-secret" "mountPath" }}' → /run/secrets
    asserts:
      - equal:
          path: data.CACHE_DIR
          value: /run/secrets

  - it: common configmap applies us-west-1 region override from prod values
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    # global.region=us-west-1; prod.common.regions.us-west-1.configMap.data.BROKER_ADDRESS
    asserts:
      - equal:
          path: data.BROKER_ADDRESS
          value: broker.us-west-1.example.com:9092

  - it: common configmap applies us-east-1 region override when region changes
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    set:
      global.region: us-east-1
    asserts:
      - equal:
          path: data.DB_URL
          value: postgresql://db.us-east-1.example.com:5432/myapp

  - it: common configmap merges prod static data (DB_SSL_ENABLED)
    templates:
      - charts/common/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    asserts:
      - equal:
          path: data.DB_SSL_ENABLED
          value: "true"

  - it: master configmap renders per-component mode value
    templates:
      - charts/master/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    # common.values.yaml: master.configMap.data.mode: master
    asserts:
      - equal:
          path: data.mode
          value: master

  - it: worker configmap renders per-component mode value
    templates:
      - charts/worker/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    # common.values.yaml: worker.configMap.data.mode: worker
    asserts:
      - equal:
          path: data.mode
          value: worker

  - it: master configmap carries master chart name in labels
    templates:
      - charts/master/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: master

  - it: worker configmap carries worker chart name in labels
    templates:
      - charts/worker/templates/configmap.yaml
    values:
      - ../common.values.yaml
      - ../prod.values.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: worker
