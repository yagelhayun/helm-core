global:
  region: us-west-1
  port: 8080
  ignoreLookup: "true"

  image:
    pullSecrets:
      - global-registry-secret

  envFrom:
    secrets:
      fire-devops-push: {}
    configMaps:
      common: {}

  volumes:
    secrets:
      fire-devops-push:
        mountPath: /tmp
        files:
          - .dockerconfigjson
    empty:
      kafka-writable-mount:
        mountPath: /kafka

  env:
    secrets:
      devops-switchover:
        - key: PORTAL_API_TOKEN
          variable: test1

common:
  configMap:
    data:
      IS_CLOUD: "true"
      KafkaTempKeystoreLocation: '{{ index .Values.global.volumes.secrets "fire-devops-push" "mountPath" }}'
      PORT: "{{ .Values.global.port }}"

worker:
  port: 9999
  portName: grpc

  configMap:
    data:
      mode: worker

  image:
    url: worker

  initContainers:
    - name: wait-for-kafka
      image:
        url: busybox
        tag: "1.36"
      command: ["/bin/sh"]
      args: ["-c", "echo waiting for kafka"]
      resources:
        cpu: 50m
        memory: 64Mi

master:
  port: 1111
  portName: api

  configMap:
    data:
      mode: master

  image:
    url: master
