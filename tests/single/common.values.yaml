global:
  region: us-west-1
  ignoreLookup: "true"

activeRegion: us-west-1

port: 5000
portName: api

resources:
  cpu: 250m
  memory: 500Mi

replicas: 3

image:
  url: myrepo/myapp
  pullSecrets:
    - my-registry-secret

volumes:
  secrets:
    fire-devops-push:
      mountPath: /
  empty:
    kafka-writable-mount:
      mountPath: /kafka

envFrom:
  secrets:
    fire-devops-push: {}
  configMaps:
    fire-devops-push: {}

env:
  secrets:
    devops-switchover:
      - key: PORTAL_API_TOKEN
        variable: test1
      - key: PORTAL_API_TOKEN
        variable: test2
  configMaps:
    devops-switchover:
      - key: DB_IDS
        variable: test3

configMap:
  data:
    KEY1: "VALUE"
    KEY2: "4565"
    KEY3: "0/10 * * * *"
    PORT: "{{ .Values.port }}"

regions:
  us-east-1:
    configMap:
      data:
        ENDPOINT: "storage.us-east-1.com"
        URL: "sso.us-east-1.com"
  us-west-1:
    configMap:
      data:
        ENDPOINT: "storage.us-west-1.com"
        URL: "sso.us-west-1.com"

probes:
  readiness:
    httpGet:
      path: /whoami
      port: 3000
      scheme: HTTP
  liveness:
    exec:
      command:
        - echo
        - alive
    failureThreshold: 1
    initialDelaySeconds: 15
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 30
  startup:
    httpGet:
      path: /health
      port: 3000
    failureThreshold: 30
    periodSeconds: 10

initContainers:
  - name: db-migration
    image:
      url: myrepo/migrator
      tag: "1.0"
    command: ["/bin/sh"]
    args: ["-c", "echo running migration && sleep 2"]
    resources:
      cpu: 100m
      memory: 128Mi

sidecars:
  - name: log-shipper
    image:
      url: fluent/fluent-bit
      tag: "2.2"
    port: 2020
    portName: metrics
    resources:
      cpu: 50m
      memory: 64Mi
