version: '3'

tasks:
  setup:
    desc: "Package helm-core for local development"
    cmds:
      - rm -f core-*.tgz
      - helm package .

  template:single:
    desc: Render test-charts/single
    cmds:
      - helm dependency update test-charts/single
      - helm template test test-charts/single -f test-charts/single/common.values.yaml

  template:umbrella:
    desc: Render test-charts/umbrella
    cmds:
      - helm dependency update test-charts/umbrella
      - helm template test test-charts/umbrella -f test-charts/umbrella/common.values.yaml

  test:
    desc: Run helm-core unit tests
    cmds:
      - helm dependency update test-charts/single
      - helm dependency update test-charts/umbrella
      - helm unittest test-charts/single -f 'unit-tests/*_test.yaml'
      - helm unittest test-charts/umbrella -f 'unit-tests/*_test.yaml'
